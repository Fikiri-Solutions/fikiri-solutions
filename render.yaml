services:
  - type: web
    name: fikiri-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --timeout ${GUNICORN_TIMEOUT:-120} --bind 0.0.0.0:$PORT app:wsgi_app
    plan: starter
    disk:
      name: fikiri-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    envVars:
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///data/fikiri.db
      - key: REDIS_URL
        sync: false
      - key: WEB_CONCURRENCY
        value: "4"
      - key: GUNICORN_THREADS
        value: "4"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: APP_RATE_LIMIT_PER_HOUR
        value: 1000 per hour
      - key: APP_RATE_LIMIT_PER_MINUTE
        value: 100 per minute
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_DSN_WEBHOOKS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false  # Set in Render dashboard - DO NOT hardcode secrets
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://fikirisolutions.com/api/oauth/gmail/callback
      - key: FERNET_KEY
        sync: false  # Set in Render dashboard - DO NOT hardcode secrets
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
    healthCheckPath: /api/health/live
    autoDeploy: true
    branch: main
    
  - type: web
    name: fikiri-backend-staging
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --timeout ${GUNICORN_TIMEOUT:-120} --bind 0.0.0.0:$PORT app:wsgi_app
    plan: starter
    envVars:
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: FLASK_ENV
        value: staging
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///data/fikiri_staging.db
      - key: REDIS_URL
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"
    healthCheckPath: /api/health/live
    autoDeploy: true
    branch: develop
