name: CI/CD Pipeline

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Single deploy pipeline: develop → staging (GitHub Environment "staging"), main → production ("production").
# Create repo: Settings → Environments → New → names "staging" and "production" (can be empty; repo secrets
# still apply). Add environment-specific secrets or protection rules as needed. Staging Vercel should use a
# dedicated project: set VERCEL_PROJECT_ID in the staging environment to that project; production environment
# has the production VERCEL_PROJECT_ID.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      deploy_id:
        description: 'Render deploy ID for rollback'
        required: false
      vercel_deployment_id:
        description: 'Vercel deployment ID for rollback'
        required: false

env:
  NODE_VERSION: '20.18.2'  # Latest LTS with security patches (CVE-2025-23083, CVE-2025-23084, CVE-2025-23085)
  PYTHON_VERSION: '3.11'

jobs:
  # Frontend Tests and Build
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Run TypeScript check
      run: npm run type-check
      continue-on-error: true
    
    - name: Run unit tests
      run: npm run test:unit
    
    - name: Build application
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
        retention-days: 7

  # Backend Tests and Build
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set CI Fernet key
      run: |
        echo "FERNET_KEY=$(python3 -c 'import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" >> "$GITHUB_ENV"
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov
    
    - name: Run linting
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check . || true
        isort --check-only . || true
    
    - name: Run type checking
      run: mypy core/ app.py --ignore-missing-imports --explicit-package-bases --namespace-packages
      continue-on-error: true
    
    - name: Run unit tests
      run: pytest tests/ -m "not contract and not integration" -v --cov=core --cov-report=xml
    
    - name: Run integration tests (main only, optional)
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
      run: pytest tests/integration/ -v --tb=short
      continue-on-error: true
      env:
        TEST_DATABASE_URL: "sqlite:///:memory:"
        TEST_REDIS_URL: "redis://localhost:6379/15"
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage

  # Security Scanning
  security:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    permissions:
      security-events: write
      contents: read
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '0'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Run Bandit security linter
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Run npm audit
      run: |
        cd frontend
        npm audit --audit-level=moderate || true

  # Performance Testing
  performance:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      LHCI_GITHUB_APP_TOKEN: ${{ secrets['LHCI_GITHUB_APP_TOKEN'] || '' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli@0.12.x
    
    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Run Lighthouse CI
      run: |
        cd frontend
        lhci autorun || true
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ env.LHCI_GITHUB_APP_TOKEN }}

  # Docker Build and Push
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend, security]
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DOCKER_USERNAME: ${{ secrets['DOCKER_USERNAME'] || '' }}
      DOCKER_PASSWORD: ${{ secrets['DOCKER_PASSWORD'] || '' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/fikiri-backend:latest
          ${{ env.DOCKER_USERNAME }}/fikiri-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deployment to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, performance]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    env:
      VERCEL_TOKEN: ${{ secrets['VERCEL_TOKEN'] || '' }}
      VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] || '' }}
      VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] || '' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to Render (Staging)
      if: github.ref == 'refs/heads/develop'
      env:
        RENDER_API_KEY: ${{ secrets['RENDER_API_KEY'] || '' }}
        RENDER_STAGING_SERVICE_ID: ${{ secrets['RENDER_STAGING_SERVICE_ID'] || '' }}
      run: |
        if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_STAGING_SERVICE_ID" ]; then
          curl -sS -X POST "https://api.render.com/v1/services/$RENDER_STAGING_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' || true
        fi
    
    # Vercel: VERCEL_PROJECT_ID in the staging environment should point at a dedicated staging project.
    # --prod deploys that project's production URL (not the same as app production).
    - name: Deploy to Vercel (Staging)
      if: github.ref == 'refs/heads/develop'
      run: |
        if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        else
          echo "Skipping Vercel deploy (missing VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID)"
        fi
    
    - name: Health check (staging API)
      if: github.ref == 'refs/heads/develop'
      env:
        RENDER_STAGING_URL: ${{ secrets['RENDER_STAGING_URL'] || '' }}
      run: |
        if [ -n "$RENDER_STAGING_URL" ]; then
          sleep 60
          curl -fsS "$RENDER_STAGING_URL/api/health" || exit 1
        fi

  # Deployment to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, performance, docker]
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets['VERCEL_TOKEN'] || '' }}
      VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] || '' }}
      VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] || '' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to Render (Production)
      if: github.ref == 'refs/heads/main'
      env:
        RENDER_API_KEY: ${{ secrets['RENDER_API_KEY'] || '' }}
        RENDER_PRODUCTION_SERVICE_ID: ${{ secrets['RENDER_PRODUCTION_SERVICE_ID'] || '' }}
      run: |
        if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_PRODUCTION_SERVICE_ID" ]; then
          curl -sS -X POST "https://api.render.com/v1/services/$RENDER_PRODUCTION_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' || true
        fi
    
    - name: Deploy to Vercel (Production)
      if: github.ref == 'refs/heads/main'
      run: |
        if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        else
          echo "Skipping Vercel deploy (missing VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID)"
        fi
    
    - name: API health, migrations, cache (production)
      if: github.ref == 'refs/heads/main'
      env:
        PRODUCTION_BASE_URL: ${{ secrets['PRODUCTION_BASE_URL'] || '' }}
        BACKEND_URL: ${{ secrets['BACKEND_URL'] || '' }}
      run: |
        BASE="${PRODUCTION_BASE_URL:-$BACKEND_URL}"
        if [ -z "$BASE" ]; then
          echo "Skipping API post-deploy checks (set PRODUCTION_BASE_URL or BACKEND_URL)"
          exit 0
        fi
        sleep 60
        curl -fsS "$BASE/api/health" || exit 1
        curl -sS -X POST "$BASE/api/database/migrations/run" || true
        curl -sS -X POST "$BASE/api/cache/clear" || true
    
    - name: Smoke tests (frontend + backend URLs)
      if: github.ref == 'refs/heads/main'
      env:
        BACKEND_URL: ${{ secrets['BACKEND_URL'] || '' }}
        FRONTEND_URL: ${{ secrets['FRONTEND_URL'] || '' }}
      run: |
        if [ -n "$BACKEND_URL" ] && [ -n "$FRONTEND_URL" ]; then
          sleep 30
          curl -fsS "$BACKEND_URL/api/health" || exit 1
          curl -fsS "$FRONTEND_URL" || exit 1
        fi
    
    - name: Notify deployment success
      if: always() && github.event_name != 'pull_request'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets['SLACK_WEBHOOK_URL'] || '' }}
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Fikiri deploy: ${{ github.repository }} ${{ github.ref }}\"}" \
            "$SLACK_WEBHOOK_URL" || true
        fi

  # Post-production load test (optional; set repo variable K6_CI_ENABLED and secret PERF_API_BASE_URL)
  k6-load-test:
    runs-on: ubuntu-latest
    needs: deploy-production
    # Post-deploy probe only; do not fail the pipeline on threshold breaches.
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && vars['K6_CI_ENABLED'] == 'true'
    env:
      API_BASE_URL: ${{ secrets['PERF_API_BASE_URL'] || '' }}
      K6_PROFILE: ${{ vars.K6_PROFILE || 'soft' }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install k6
      uses: grafana/setup-k6-action@v1
    
    - name: Run performance tests
      run: |
        if [ -n "$API_BASE_URL" ]; then
          mkdir -p k6-results
          k6 run scripts/k6-performance-test.js
        else
          echo "Skipping k6 (PERF_API_BASE_URL not set)"
        fi

  # Rollback Job (Manual trigger)
  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Rollback Render deployment
      env:
        RENDER_API_KEY: ${{ secrets['RENDER_API_KEY'] || '' }}
        RENDER_PRODUCTION_SERVICE_ID: ${{ secrets['RENDER_PRODUCTION_SERVICE_ID'] || '' }}
        DEPLOY_ID: ${{ github.event.inputs.deploy_id }}
      run: |
        if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_PRODUCTION_SERVICE_ID" ] && [ -n "$DEPLOY_ID" ]; then
          curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_PRODUCTION_SERVICE_ID/deploys/$DEPLOY_ID/rollback" || true
        fi
    
    - name: Rollback Vercel deployment
      if: github.event.inputs.vercel_deployment_id != ''
      env:
        VERCEL_TOKEN: ${{ secrets['VERCEL_TOKEN'] || '' }}
        VERCEL_DEPLOYMENT_ID: ${{ github.event.inputs.vercel_deployment_id }}
      run: |
        if [ -n "$VERCEL_TOKEN" ]; then
          npm install -g vercel@latest
          vercel rollback "$VERCEL_DEPLOYMENT_ID" --token "$VERCEL_TOKEN" --yes || true
        fi
    
    - name: Notify rollback
      if: always() && github.event_name == 'workflow_dispatch'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets['SLACK_WEBHOOK_URL'] || '' }}
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ Fikiri rollback: ${{ github.repository }}\"}" \
            "$SLACK_WEBHOOK_URL" || true
        fi
