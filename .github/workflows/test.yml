name: Comprehensive Test Suite

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Optional smoke checks against a live URL (staging recommended).
# Set repository secrets SMOKE_API_BASE_URL and SMOKE_SITE_URL to enable; leave unset to skip
# (avoids coupling every PR to production uptime and accidental load).

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20.18.2']  # Latest patched LTS version

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript type check
      run: |
        cd frontend
        npm run type-check
      continue-on-error: true

    - name: ESLint code quality check
      run: |
        cd frontend
        npm run lint

    - name: Run unit tests
      run: |
        cd frontend
        npm test -- --run --coverage

    - name: Build test
      run: |
        cd frontend
        npm run build

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        file: frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  backend-health:
    runs-on: ubuntu-latest
    env:
      SMOKE_API_BASE_URL: ${{ secrets.SMOKE_API_BASE_URL || '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Backend smoke (optional)
      run: |
        if [ -z "$SMOKE_API_BASE_URL" ]; then
          echo "Skipping backend smoke — set GitHub secret SMOKE_API_BASE_URL (e.g. staging API origin, no trailing slash)"
          exit 0
        fi
        echo "Testing backend health..."
        curl -fsS "$SMOKE_API_BASE_URL/api/health"
        echo "Testing CRM API endpoint..."
        curl -fsS "$SMOKE_API_BASE_URL/api/crm/leads"

  frontend-deployment:
    runs-on: ubuntu-latest
    env:
      SMOKE_SITE_URL: ${{ secrets.SMOKE_SITE_URL || '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Frontend smoke (optional)
      run: |
        if [ -z "$SMOKE_SITE_URL" ]; then
          echo "Skipping frontend smoke — set GitHub secret SMOKE_SITE_URL (e.g. https://your-preview.vercel.app)"
          exit 0
        fi
        echo "Testing frontend deployment..."
        curl -fsS "$SMOKE_SITE_URL"
        echo "Checking for latest build..."
        BUILD_HASH=$(curl -fsS "$SMOKE_SITE_URL" | grep -o 'index-[a-f0-9]*\.js' | head -1)
        echo "Current build hash: $BUILD_HASH"
        if [ -z "$BUILD_HASH" ]; then
          echo "No build hash found - deployment may be stale"
        fi

  integration-test:
    runs-on: ubuntu-latest
    needs: [test, backend-health, frontend-deployment]
    env:
      SMOKE_API_BASE_URL: ${{ secrets.SMOKE_API_BASE_URL || '' }}
      SMOKE_SITE_URL: ${{ secrets.SMOKE_SITE_URL || '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Integration smoke (optional)
      run: |
        if [ -z "$SMOKE_API_BASE_URL" ] || [ -z "$SMOKE_SITE_URL" ]; then
          echo "Skipping integration smoke — set both SMOKE_API_BASE_URL and SMOKE_SITE_URL"
          exit 0
        fi
        echo "Running integration smoke..."
        curl -sS "$SMOKE_SITE_URL/crm" | grep -q "CRM" || true
        curl -sS "$SMOKE_API_BASE_URL/api/ai/chat" \
          -H "Content-Type: application/json" \
          -d '{"message":"test"}' | grep -q "response" || true
        echo "✅ Integration smoke finished (best-effort checks)"

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run security audit
      run: |
        cd frontend
        npm audit --audit-level moderate || true
