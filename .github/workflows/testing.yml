name: Extended QA (nightly)

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Heavy checks (full-stack integration, optional k6, security artifacts).
# PR/push gates live in ci-cd.yml; path-scoped PR jobs in frontend.yml / backend.yml.

concurrency:
  group: extended-qa-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.2'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest requests python-dotenv

    - name: Set up environment
      run: |
        cp env.template .env 2>/dev/null || true
        echo "JWT_SECRET_KEY=$(openssl rand -hex 32)" >> .env
        echo "FERNET_KEY=$(python3 -c 'import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" >> "$GITHUB_ENV"
        echo "FERNET_KEY=$FERNET_KEY" >> .env
        echo "REDIS_URL=redis://localhost:6379/0" >> .env
        echo "FLASK_ENV=test" >> .env
        echo "PORT=5000" >> .env
        sed -i '/^DATABASE_URL=/d' .env 2>/dev/null || true
        echo "# DATABASE_URL left unset to use SQLite" >> .env

    - name: Wait for backend health
      run: |
        script -qefc "python app.py" /dev/null &
        for i in $(seq 1 30); do
          if curl -fsS http://localhost:5000/api/health >/dev/null 2>&1; then
            echo "Backend ready"
            exit 0
          fi
          sleep 2
        done
        echo "Backend failed to become healthy"
        exit 1

    - name: Start frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run dev &
        for i in $(seq 1 30); do
          if curl -fsS http://localhost:5174 >/dev/null 2>&1; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 2
        done
        echo "Frontend failed to become healthy"
        exit 1

    - name: Run integration tests
      run: pytest tests/integration/ -v --tb=short

  performance-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      API_BASE_URL: ${{ secrets.PERF_API_BASE_URL }}
      K6_PROFILE: ${{ vars.K6_PROFILE || 'soft' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.2'

    - name: Install k6
      uses: grafana/setup-k6-action@v1

    - name: Run k6 performance tests
      run: |
        if [ "${{ vars.K6_CI_ENABLED }}" != "true" ]; then
          echo "k6 skipped: set repository variable K6_CI_ENABLED=true"
          mkdir -p k6-results
          echo '{"skipped":true,"reason":"K6_CI_ENABLED not true"}' > k6-results/skipped.json
          exit 0
        fi
        if [ -z "$API_BASE_URL" ]; then
          echo "Skipping k6: PERF_API_BASE_URL secret not set"
          mkdir -p k6-results
          echo '{"skipped":true,"reason":"PERF_API_BASE_URL not configured"}' > k6-results/skipped.json
          exit 0
        fi
        mkdir -p k6-results
        k6 run scripts/k6-performance-test.js
        if [ "${{ vars.K6_STRESS_CI_ENABLED }}" = "true" ]; then
          k6 run scripts/k6-stress-test.js
        fi

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: k6-results/
        retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '0'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run npm audit
      working-directory: ./frontend
      run: npm ci && npm audit --audit-level=high || true

    - name: Run Python security check
      run: |
        pip install safety bandit
        safety check || true
        bandit -r core/ app.py -f json -o bandit-report.json || true

    - name: Upload security artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results
        path: bandit-report.json
        retention-days: 30
