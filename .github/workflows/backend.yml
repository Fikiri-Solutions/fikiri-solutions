name: Backend CI

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Tests and coverage only. Deploys (staging → develop, production → main) live in ci-cd.yml to avoid
# duplicate Render/Vercel triggers.

on:
  push:
    branches: [ main, develop ]
    paths: [ 'core/**', 'routes/**', 'app.py', 'requirements.txt', 'services/**', 'crm/**', 'analytics/**', 'email_automation/**' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ 'core/**', 'routes/**', 'app.py', 'requirements.txt', 'services/**', 'crm/**', 'analytics/**', 'email_automation/**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FERNET_KEY: "dKxuXPyNhHB-eRv-rPD_EYz0S088dRI6NOrlXO5eV_I="
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov bandit
    
    - name: Run security audit
      run: bandit -r core/ app.py || true
    
    - name: Run type checking
      run: |
        pip install mypy
        mypy core/ app.py --ignore-missing-imports --explicit-package-bases --namespace-packages
      continue-on-error: true
    
    - name: Run tests
      run: |
        pytest tests/ -m "not contract and not integration" -v --cov=core --cov=app --cov-report=xml
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
