# Messy-language variation matrix — manual widget QA seeds (capability map first).
# Each seed has original + short / simple / long / complex phrasings.
schema_version: v1

cases:
  # --- Seed 1: site + lead tracking without manual work ---
  - name: site_track_original
    seed: site_track_leads
    style: original
    messages:
      - I need a site but I don't want to manually track every lead.
    must_qualify: true
    qualification_any: [interested, quoted, lead, website, intake, crm]
    prefer_answer: true

  - name: site_track_short
    seed: site_track_leads
    style: short
    messages:
      - need site track leads
    must_qualify: true
    qualification_any: [quoted, lead, website, crm, visitor mentioned]
    prefer_answer: true

  - name: site_track_simple
    seed: site_track_leads
    style: simple
    messages:
      - I want a website that tracks my leads for me
    must_qualify: true
    qualification_any: [interested, quoted, lead, website, crm]
    prefer_answer: true

  - name: site_track_long
    seed: site_track_leads
    style: long
    messages:
      - I'm looking for a website solution because I don't have time to manually track every single lead that comes in
    must_qualify: true
    qualification_any: [interested, quoted, lead, website, manual]
    prefer_answer: true

  - name: site_track_complex
    seed: site_track_leads
    style: complex
    messages:
      - We require a digital presence with automated lead attribution rather than manual spreadsheet tracking
    must_qualify: true
    qualification_any: [interested, quoted, lead, website, visitor mentioned]
    prefer_answer: true

