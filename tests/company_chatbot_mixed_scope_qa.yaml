# Mixed-scope QA conversations — tune via capability map (6e) + miss review (6d).
# Rule: phrase → capability map → family relations → KB only if factual gap → eval → tests
#
# Fields:
#   messages          — one or more user turns (full bot path)
#   expected_families — at least one must match detect_needs on final turn
#   min_families      — optional minimum family count (mixed scope)
#   expected_bundle   — optional suggested bundle id
#   expected_mode     — optional orchestrator mode on final turn
#   must_include      — phrases in final bot response
#   must_not_include  — forbidden phrases in final response
#   expected_grounded — default true; set false for honest-fallback cases

cases:
  - name: website_plus_lead_tracking
    user_example: true
    messages:
      - I need a website but also something to track leads
    expected_families: [website_and_landing_pages, crm_and_lead_tracking]
    min_families: 2
    expected_bundle: lead_intake_system
    expected_mode: answer
    must_include:
      - mix
    must_not_include:
      - I don't have enough verified

  - name: book_and_pay_online
    user_example: true
    messages:
      - Can customers book and pay online?
    expected_families: [payments_and_booking, forms_and_intake]
    min_families: 2
    expected_bundle: booking_and_payments_flow
